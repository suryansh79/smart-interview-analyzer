version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sia-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-interview_analyzer}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-interview_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sia-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: sia-ai-service
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ai_uploads:/app/uploads
    networks:
      - sia-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sia-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-interview_analyzer}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-myDefaultDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-smart-interview-analyzer-audio-2026}
      FLASK_SERVICE_URL: http://ai-service:5000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - sia-network

volumes:
  postgres_data:
  ai_uploads:

networks:
  sia-network:
    driver: bridge
